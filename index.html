<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocon Agencement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
  </head>
  <body>
    <main>
        <div class="position-relative overflow-hidden mb-md-3 text-center bg-light">
            <section class="item-section-container">
                <div class="col-md-9 p-lg-5 mx-auto my-5">
                    <h1 class="display-4 fw-normal item-section-title">Cocon Lead magnet</h1>
                    <div class="container item-section">
                        <div class="row g-4 py-5">
                            <div class="col align-self-center p-2">
                                <button class="text-light btn btn-dark w-100 p-3 rounded" data-section="pro">Pro</button>
                            </div>
                            <div class="col-1 align-self-center p-2">
                                <span>OU</span>
                            </div>
                            <div class="col align-self-center p-2">
                                <button class="text-light btn btn-dark w-100 p-3 rounded" data-section="individual">Particulier</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <div class="progress rounded-0">
                <div class="progress-bar bg-success" role="progressbar" style="width: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">25%</div>
            </div>
        </div>
    </main>

    <template id="tpl-item-section">
        <div class="col-md-9 p-lg-5 mx-auto my-5">
            <h1 class="display-4 fw-normal item-section-title">Titre de la section</h1>
            
             <div class="container item-section">
                <!-- Liste de choix -->
                <div class="row g-4 py-5 item-section-choice"></div>
            </div>
        </div>
    </template>

    <template id="tpl-item-section-type">
        <div class="col-12 col-md-4 m-3 align-self-center item-section-type" style="width: 18rem;">
            <img src="https://via.placeholder.com/300?text=Luminaire1" class="rounded" alt="Image 1">
        </div>
    </template>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
    <script src="js/data.js"></script>
  </body>
</html>
